# memdump-toolkit detection signatures
#
# Bytes patterns: use double-quoted strings with \x escapes for binary data.
# Example: "\xfc\x48\x83\xe4\xf0" for binary, "UPX0" for ASCII.
#
# Add new tools/signatures here — they are picked up on the next scan
# without any code changes.
#


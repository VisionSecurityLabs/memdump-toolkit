    - "socks4://"
    - "socksAuth"
    - "SOCKS5Connect"
  credential_theft:
    - "mimikatz"
    - "sekurlsa"
    - "logonPasswords"
  encryption:
    - "chacha20"
    - "poly1305"
    - "hkdf"
  c2_websocket:
    - "nhooyr.io/websocket"
    - "gorilla/websocket"
  multiplexing:
    - "yamux"
    - "hashicorp/yamux"
  kerberos:
    - "sspi/kerberos"
    - "KerberosSSP"
  ntlm:
    - "sspi/ntlm"
    - "NTLMSSP"
  smb:
    - "SMBSession"
    - "buildSMB"
    - "parseSMB"
  ldap:
    - "parseLDAP"
    - "ldap.Conn"
  icmp:
    - "IcmpReq"
    - "icmp.Message"
  pivot:
    - "PivotStart"
    - "PivotStop"

# Tier 2: Generic — require 2+ matches within extracted strings
CAPABILITY_WEAK:
  reverse_shell:
    - "reverse_shell"
    - "cmd.exe"
    - "/bin/sh"
    - "/bin/bash"
  port_forwarding:
    - "portfwd"
    - "portforward"
    - "tunnel"
  persistence:

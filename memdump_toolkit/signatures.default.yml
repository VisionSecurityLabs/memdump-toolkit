  lateral_movement:
    - "psexec"
    - "winrm"
    - "WMIExec"


# ─── Universal Binary Analysis (Language-Agnostic) ──────────────────────────

# Packer/crypter artifact signatures (section names and header strings)
# In memory dumps, binaries are UNPACKED — we detect leftover artifacts.
PACKER_SIGNATURES:
  UPX:
    - "UPX0"
    - "UPX1"
    - "UPX!"
    - "UPX2"
  Themida:
    - "Themida"
    - ".themida"
    - "Oreans"
  VMProtect:
    - ".vmp0"
    - ".vmp1"
    - "VMProtect"
  ASPack:
    - ".aspack"
    - ".adata"
    - "ASPack"
  MPRESS:
    - ".MPRESS1"
    - ".MPRESS2"
  Enigma:
    - ".enigma1"
    - ".enigma2"
    - "Enigma protector"
  PECompact:
    - "PECompact2"
    - "PEC2"
  Armadillo:
    - "Armadillo"
    - ".text1\x00"
  Obsidium:
    - "Obsidium"
    - ".obsidium"
  NSPack:
    - ".nsp0"
    - ".nsp1"
    - "nsPack"

# Language identification signatures
LANG_SIGNATURES:
  rust:
    - "panicked at"
    - "rust_begin_unwind"
    - "/rustc/"
    - ".cargo/registry"
    - "core::panicking"
    - "core::fmt::write"
    - "alloc::raw_vec"
    - "std::rt::lang_start"
  delphi:
    - "TObject\x00"
    - "Borland C++ -"
    - "Embarcadero"
    - "TForm\x00"
    - "System.SysUtils"
    - "Classes.TComponent"
  nim:
    - "@nimMain"
    - "stdlib_system"
    - "Nim/lib/"
    - "nimbase.h"
    - "NimMainModule"
    - "NimMainInner"
# Go and .NET are detected via structural checks (score-based / CLR header),
# not string signatures. These cover languages without structural markers.



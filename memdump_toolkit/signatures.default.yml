# ─── Shellcode Detection ────────────────────────────────────────────────────

# Known shellcode prologues (first bytes of common payloads)
# SHELLCODE_PROLOGUES: each value is a single bytes pattern
SHELLCODE_PROLOGUES:
  # Cobalt Strike beacon (x64): cld; and rsp, -10h; call $+5
  CobaltStrike_x64: "\xfc\x48\x83\xe4\xf0"
  # Cobalt Strike beacon (x86): cld; call $+5
  CobaltStrike_x86: "\xfc\xe8"
  # Metasploit reverse_tcp (x64): cld; and rsp, -10h; mov r14, ...
  Metasploit_x64: "\xfc\x48\x83\xe4\xf0\xe8"
  # Metasploit reverse_tcp (x86): cld; call dword [ebp+...]
  Metasploit_x86: "\xfc\xe8\x82\x00\x00\x00"
  # Generic x64 sub rsp, N prologue (common in custom shellcode)
  Generic_x64_sub_rsp: "\x48\x83\xec"
  # msfvenom shikata_ga_nai decoder stub
  Shikata_ga_nai: "\xd9\x74\x24\xf4"

# Byte patterns to search within RWX regions (not just at offset 0)
# SHELLCODE_PATTERNS: each value has pattern + description
SHELLCODE_PATTERNS:
  # PEB access (x64): mov rax, gs:[0x60]
  PEB_access_x64:
    pattern: "\x65\x48\x8b\x04\x25\x60\x00\x00\x00"
    description: "GS:[0x60] PEB access (x64)"
  # PEB access (x86): mov eax, fs:[0x30]
  PEB_access_x86:
    pattern: "\x64\xa1\x30\x00\x00\x00"
    description: "FS:[0x30] PEB access (x86)"
  # PEB_LDR_DATA access (x64): mov rax, [rax+0x18]
  PEB_LDR_x64:
    pattern: "\x48\x8b\x40\x18"
    description: "PEB->Ldr (x64)"
  # Hash-based API resolution: ror edi, 0xD (common in shellcode)
  API_hash_ror13:
    pattern: "\xc1\xcf\x0d"
    description: "ROR EDI,0xD API hashing"
  # NtAllocateVirtualMemory syscall stub pattern
  Syscall_stub:
    pattern: "\x0f\x05\xc3"
    description: "syscall; ret (direct syscall)"
  # VirtualAlloc / VirtualProtect call setup (common in loaders)
  WinExec_hash:
    pattern: "\x68\x72\xfe\xb3\x16"
    description: "WinExec hash push (CRC32)"

# NOP sled variants (sliding window detection)
NOP_PATTERNS:
  - "\x90\x90\x90\x90\x90\x90\x90\x90\x90\x90\x90\x90\x90\x90\x90\x90"
  - "\x0f\x1f\x00\x0f\x1f\x00\x0f\x1f\x00\x0f\x1f\x00\x0f\x1f\x00"
  - "\x0f\x1f\x40\x00\x0f\x1f\x40\x00\x0f\x1f\x40\x00\x0f\x1f\x40\x00"
  - "\x66\x90\x66\x90\x66\x90\x66\x90\x66\x90\x66\x90\x66\x90\x66\x90"


